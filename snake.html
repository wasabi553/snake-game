<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  body {
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', 'PingFang SC', sans-serif;
    color: #fff;
  }
  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(15, 15, 35, 0.6);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 25px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    max-width: 96vw;
    max-height: 96vh;
  }
  #header {
    text-align: center;
    margin-bottom: 12px;
    width: 100%;
  }
  #title {
    font-size: clamp(24px, 5vw, 42px);
    font-weight: 900;
    background: linear-gradient(90deg, #00fff5, #ff2e63, #f9ed69);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  #subtitle {
    font-size: clamp(10px, 1.5vw, 13px);
    color: rgba(255,255,255,0.4);
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  #stats {
    display: flex;
    justify-content: space-around;
    margin-bottom: 12px;
    width: 100%;
    gap: 12px;
  }
  .stat-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 8px 20px;
    text-align: center;
    flex: 1;
  }
  .stat-label {
    font-size: clamp(9px, 1.2vw, 11px);
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .stat-value {
    font-size: clamp(16px, 3vw, 24px);
    font-weight: 700;
    color: #00fff5;
    text-shadow: 0 0 15px rgba(0,255,245,0.5);
  }
  #buff-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    min-height: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .buff-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: clamp(10px, 1.4vw, 13px);
    font-weight: 700;
    letter-spacing: 1px;
    animation: buffPulse 1s ease-in-out infinite;
  }
  @keyframes buffPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .buff-speed { background: rgba(255,45,99,0.25); border: 2px solid #ff2e63; color: #ff6b9d; box-shadow: 0 0 18px rgba(255,45,99,0.5); }
  .buff-slow { background: rgba(124,77,255,0.25); border: 2px solid #7c4dff; color: #b388ff; box-shadow: 0 0 18px rgba(124,77,255,0.5); }
  .buff-wall { background: rgba(255,165,0,0.25); border: 2px solid #ffa500; color: #ffcc00; box-shadow: 0 0 18px rgba(255,165,0,0.5); }
  .buff-shield { background: rgba(0,229,255,0.25); border: 2px solid #00e5ff; color: #00f0ff; box-shadow: 0 0 18px rgba(0,229,255,0.5); }
  .buff-double { background: rgba(0,255,0,0.25); border: 2px solid #00ff00; color: #66ff66; box-shadow: 0 0 18px rgba(0,255,0,0.5); }
  #game-wrap {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,255,245,0.1), 0 0 0 1px rgba(255,255,255,0.05);
    display: flex;
    justify-content: center;
    align-items: center;
  }
  canvas {
    display: block;
    background: #0a0a1a;
    max-width: 90vw;
    max-height: 70vh;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(10, 10, 26, 0.92);
    backdrop-filter: blur(8px);
    transition: opacity 0.4s;
    z-index: 10;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay-title {
    font-size: clamp(28px, 6vw, 56px);
    font-weight: 900;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #00fff5, #ff2e63);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .overlay-sub {
    font-size: clamp(12px, 2vw, 18px);
    color: rgba(255,255,255,0.6);
    margin-bottom: 20px;
  }
  .overlay-score {
    font-size: clamp(16px, 3.5vw, 32px);
    color: #f9ed69;
    text-shadow: 0 0 20px rgba(249,237,105,0.5);
    margin-bottom: 20px;
    font-weight: 700;
  }
  #btn {
    padding: 12px 40px;
    font-size: clamp(12px, 2vw, 16px);
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    background: linear-gradient(90deg, #00fff5, #0088ff);
    color: #0a0a1a;
    box-shadow: 0 10px 30px rgba(0,255,245,0.3);
    transition: all 0.2s;
  }
  #btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 40px rgba(0,255,245,0.5);
  }
  #btn:active { transform: translateY(0); }
  #footer {
    text-align: center;
    margin-top: 12px;
    font-size: clamp(10px, 1.5vw, 12px);
    color: rgba(255,255,255,0.25);
    letter-spacing: 1px;
  }
  .key {
    display: inline-block;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 2px 8px;
    margin: 0 2px;
    font-family: monospace;
    font-size: clamp(10px, 1.5vw, 12px);
    color: rgba(255,255,255,0.6);
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="title">贪吃蛇</div>
    <div id="subtitle">NEON SNAKE</div>
  </div>
  <div id="stats">
    <div class="stat-box">
      <div class="stat-label">长度</div>
      <div class="stat-value" id="score">1</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">剩余</div>
      <div class="stat-value" id="remain">0</div>
    </div>
  </div>
  <div id="buff-bar"></div>
  <div id="game-wrap">
    <canvas id="game"></canvas>
    <div id="overlay">
      <div class="overlay-title" id="overlayTitle">贪吃蛇</div>
      <div class="overlay-sub" id="overlaySub">准备好了吗？</div>
      <div class="overlay-score" id="overlayScore" style="display:none"></div>
      <button id="btn" onclick="startGame()">开始游戏</button>
    </div>
  </div>
  <div id="footer">
    使用 <span class="key">W</span> <span class="key">A</span> <span class="key">S</span> <span class="key">D</span> 控制方向 · 撞墙失败 · 吃完全部食物通关
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const COLS = 36;
const ROWS = 26;
let CELL = 20;
let lastTick = performance.now();
let gameOver = false;
let running = false;
let snake = [];
let direction = {x: 1, y: 0};
let nextDirection = {x: 1, y: 0};
let foods = [];
let buffs = [];
let buffsSpawnedTotal = 0;
let prevPositions = [];
let particles = [];
let bgStars = [];
let activeBuffs = {};
let buffTimers = {};
let buffStartTimes = {};
let toasts = [];
let lastBuffUpdate = 0;
let baseTick = 100;

function resize() {
  const maxW = window.innerWidth * 0.88;
  const maxH = window.innerHeight * 0.62;
  const cellW = Math.floor(maxW / COLS);
  const cellH = Math.floor(maxH / ROWS);
  CELL = Math.max(10, Math.min(cellW, cellH));
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;
  initStars();
}

function initStars() {
  bgStars = [];
  for (let i = 0; i < 50; i++) {
    bgStars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.2 + 0.4,
      speed: Math.random() * 0.3 + 0.08,
      alpha: Math.random() * 0.4 + 0.1
    });
  }
}

const BUFF_TYPES = [
  { id: 'speed', name: '加速', color: '#ff2e63', class: 'buff-speed', duration: 5000, desc: '移速提升' },
  { id: 'slow', name: '减速', color: '#7c4dff', class: 'buff-slow', duration: 5000, desc: '移速降低' },
  { id: 'wall', name: '穿墙', color: '#ffa500', class: 'buff-wall', duration: 8000, desc: '可穿越边界' },
  { id: 'shield', name: '护盾', color: '#00e5ff', class: 'buff-shield', duration: 6000, desc: '可穿墙一次' },
  { id: 'double', name: '双倍', color: '#00ff00', class: 'buff-double', duration: 6000, desc: '长度翻倍增长' }
];

function getBuffConfig(id) {
  return BUFF_TYPES.find(b => b.id === id) || BUFF_TYPES[0];
}

function spawnBuff() {
  if (buffsSpawnedTotal >= 8) return;
  if (foods.length === 0) return;
  const idx = Math.floor(Math.random() * foods.length);
  const food = foods[idx];
  const type = BUFF_TYPES[Math.floor(Math.random() * BUFF_TYPES.length)];
  buffs.push({x: food.x, y: food.y, type, spawnTime: performance.now()});
  foods.splice(idx, 1);
  buffsSpawnedTotal++;
}

function startGame() {
  const totalFood = Math.floor(Math.random() * 21) + 15;
  snake = [{x: Math.floor(COLS/2), y: Math.floor(ROWS/2)}];
  direction = {x: 1, y: 0};
  nextDirection = {x: 1, y: 0};
  foods = [];
  buffs = [];
  gameOver = false;
  running = true;
  particles = [];
  toasts = [];
  prevPositions = [];
  activeBuffs = {};
  buffTimers = {};
  buffStartTimes = {};
  buffsSpawnedTotal = 0;
  
  let placed = 0;
  let attempts = 0;
  while (placed < totalFood && attempts < 5000) {
    const x = Math.floor(Math.random() * COLS);
    const y = Math.floor(Math.random() * ROWS);
    const onSnake = snake.some(s => s.x === x && s.y === y);
    const onFood = foods.some(f => f.x === x && f.y === y);
    if (!onSnake && !onFood) {
      foods.push({x, y});
      placed++;
    }
    attempts++;
  }
  
  for (let i = 0; i < 5; i++) spawnBuff();
  
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('score').textContent = '1';
  document.getElementById('remain').textContent = foods.length;
  updateBuffBar();
  lastTick = performance.now();
}

function endGame(win) {
  running = false;
  gameOver = true;
  // 清理所有 Buff 计时器
  for (const [id, timer] of Object.entries(buffTimers)) {
    clearTimeout(timer);
  }
  buffTimers = {};
  activeBuffs = {};
  buffStartTimes = {};
  updateBuffBar();
  document.getElementById('remain').textContent = '0';
  const overlay = document.getElementById('overlay');
  const title = document.getElementById('overlayTitle');
  const sub = document.getElementById('overlaySub');
  const score = document.getElementById('overlayScore');
  const btn = document.getElementById('btn');
  
  if (win) {
    title.textContent = '恭喜通关';
    title.style.background = 'linear-gradient(90deg, #f9ed69, #ff2e63)';
    title.style.webkitBackgroundClip = 'text';
    sub.textContent = '你吃掉了所有的食物';
  } else {
    title.textContent = '游戏结束';
    title.style.background = 'linear-gradient(90deg, #ff2e63, #ff0055)';
    title.style.webkitBackgroundClip = 'text';
    sub.textContent = '撞到墙壁了';
  }
  score.style.display = 'block';
  score.textContent = '最终长度: ' + snake.length;
  btn.textContent = '重新开始';
  overlay.classList.remove('hidden');
}

function addParticles(x, y, color, count = 6) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: x * CELL + CELL/2,
      y: y * CELL + CELL/2,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 1,
      color: color,
      size: Math.random() * 2.5 + 1
    });
  }
}

function activateBuff(typeId) {
  const config = getBuffConfig(typeId);
  activeBuffs[typeId] = true;
  buffStartTimes[typeId] = performance.now();
  
  if (buffTimers[typeId]) clearTimeout(buffTimers[typeId]);
  buffTimers[typeId] = setTimeout(() => {
    activeBuffs[typeId] = false;
    delete buffTimers[typeId];
    delete buffStartTimes[typeId];
    updateBuffBar();
  }, config.duration);
  
  updateBuffBar();
}

function addToast(x, y, text, color) {
  toasts.push({
    x: x * CELL + CELL/2,
    y: y * CELL,
    text: text,
    color: color,
    life: 1,
    vy: -1.5
  });
}

function getTickRate() {
  if (activeBuffs.speed) return baseTick * 0.5;
  if (activeBuffs.slow) return baseTick * 1.8;
  return baseTick;
}

function update() {
  if (!running) return;
  
  const now = performance.now();
  const tickRate = getTickRate();
  
  if (now - lastTick < tickRate) return;
  lastTick = now;
  
  direction = {...nextDirection};
  const head = snake[0];
  let nx = head.x + direction.x;
  let ny = head.y + direction.y;
  
  if (activeBuffs.wall) {
    if (nx < 0) nx = COLS - 1;
    if (nx >= COLS) nx = 0;
    if (ny < 0) ny = ROWS - 1;
    if (ny >= ROWS) ny = 0;
  } else {
  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) {
    if (activeBuffs.shield) {
      activeBuffs.shield = false;
      if (buffTimers.shield) clearTimeout(buffTimers.shield);
      delete buffTimers.shield;
      delete buffStartTimes.shield;
      updateBuffBar();
      addParticles(head.x, head.y, '#00c8ff', 15);
      addToast(head.x, head.y, '护盾穿墙', '#00c8ff');
      
      if (nx < 0) nx = COLS - 1;
      if (nx >= COLS) nx = 0;
      if (ny < 0) ny = ROWS - 1;
      if (ny >= ROWS) ny = 0;
      
      const onBody = snake.some((s, i) => i > 0 && s.x === nx && s.y === ny);
      if (onBody) {
        endGame(false);
        return;
      }
      
      prevPositions = snake.map(s => ({x: s.x, y: s.y}));
      snake[0].x = nx;
      snake[0].y = ny;
      return;
    }
    endGame(false);
    return;
  }
  }
  
  const selfCollision = snake.some((s, i) => i > 0 && s.x === nx && s.y === ny);
  if (selfCollision) {
    if (activeBuffs.shield) {
      activeBuffs.shield = false;
      if (buffTimers.shield) clearTimeout(buffTimers.shield);
      delete buffTimers.shield;
      delete buffStartTimes.shield;
      updateBuffBar();
      addParticles(head.x, head.y, '#00c8ff', 15);
      addToast(head.x, head.y, '护盾破碎', '#00c8ff');
      endGame(false);
      return;
    }
    endGame(false);
    return;
  }
  
  prevPositions = snake.map(s => ({x: s.x, y: s.y}));
  
  for (let i = snake.length - 1; i > 0; i--) {
    snake[i].x = prevPositions[i-1].x;
    snake[i].y = prevPositions[i-1].y;
  }
  snake[0].x = nx;
  snake[0].y = ny;
  
  const foodIdx = foods.findIndex(f => f.x === nx && f.y === ny);
  if (foodIdx !== -1) {
    const tail = snake[snake.length - 1];
    const grow = activeBuffs.double ? 2 : 1;
    for (let g = 0; g < grow; g++) {
      snake.push({x: tail.x, y: tail.y});
    }
    addParticles(nx, ny, '#f9ed69', 8);
    foods.splice(foodIdx, 1);
    
    document.getElementById('score').textContent = snake.length;
    document.getElementById('remain').textContent = foods.length;
    
    if (foods.length <= 0) {
      endGame(true);
      return;
    }
  }
  
  const buffIdx = buffs.findIndex(b => b.x === nx && b.y === ny);
  if (buffIdx !== -1) {
    const buff = buffs[buffIdx];
    activateBuff(buff.type.id);
    addParticles(nx, ny, buff.type.color, 12);
    addToast(nx, ny, buff.type.name + '!', buff.type.color);
    buffs.splice(buffIdx, 1);

    const tail = snake[snake.length - 1];
    const grow = (activeBuffs.double || buff.type.id === 'double') ? 2 : 1;
    for (let g = 0; g < grow; g++) {
      snake.push({x: tail.x, y: tail.y});
    }
    document.getElementById('score').textContent = snake.length;
  }
  
  if (Math.random() < 0.02 && foods.length > buffs.length) spawnBuff();
  
}

function updateBuffBar() {
  const bar = document.getElementById('buff-bar');
  bar.innerHTML = '';
  const now = performance.now();
  for (const [id, active] of Object.entries(activeBuffs)) {
    if (!active) continue;
    const config = getBuffConfig(id);
    const start = buffStartTimes[id] || now;
    const remaining = Math.max(0, Math.ceil((config.duration - (now - start)) / 1000));
    
    const tag = document.createElement('div');
    tag.className = 'buff-tag ' + config.class;
    tag.textContent = config.name + ' ' + remaining + 's';
    bar.appendChild(tag);
  }
}

function drawRoundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

function draw() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  for (let i = 0; i < bgStars.length; i++) {
    const star = bgStars[i];
    star.y += star.speed;
    if (star.y > canvas.height) {
      star.y = 0;
      star.x = Math.random() * canvas.width;
    }
    ctx.fillStyle = `rgba(255,255,255,${star.alpha})`;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fill();
  }
  
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0);
    ctx.lineTo(i * CELL, canvas.height);
    ctx.stroke();
  }
  for (let i = 0; i <= ROWS; i++) {
    ctx.beginPath();
    ctx.moveTo(0, i * CELL);
    ctx.lineTo(canvas.width, i * CELL);
    ctx.stroke();
  }
  
  for (let f = 0; f < foods.length; f++) {
    const food = foods[f];
    const pulse = 1 + Math.sin(performance.now() * 0.005 + food.x * 0.8 + food.y * 0.6) * 0.15;
    const size = CELL * 0.55 * pulse;
    const offset = (CELL - size) / 2;
    ctx.fillStyle = '#f9ed69';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#f9ed69';
    drawRoundedRect(food.x * CELL + offset, food.y * CELL + offset, size, size, 4);
  }
  ctx.shadowBlur = 0;
  
  if (performance.now() - lastBuffUpdate > 200) {
    updateBuffBar();
    lastBuffUpdate = performance.now();
  }
  
  for (let b = 0; b < buffs.length; b++) {
    const buff = buffs[b];
    const pulse = 1 + Math.sin(performance.now() * 0.008 + b) * 0.2;
    const size = CELL * 0.6 * pulse;
    const offset = (CELL - size) / 2;
    
    ctx.fillStyle = buff.type.color;
    ctx.shadowBlur = 15;
    ctx.shadowColor = buff.type.color;
    drawRoundedRect(buff.x * CELL + offset, buff.y * CELL + offset, size, size, 6);
    
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${CELL * 0.35}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(buff.type.name[0], buff.x * CELL + CELL/2, buff.y * CELL + CELL/2);
  }
  ctx.shadowBlur = 0;
  
  const now = performance.now();
  const tickRate = getTickRate();
  const t = running ? Math.min((now - lastTick) / (tickRate / 100), 1) : 1;
  
  for (let i = 0; i < snake.length; i++) {
    const seg = snake[i];
    const delay = i * 0.06;
    const duration = 1 - delay;
    let progress = duration > 0 ? Math.max(0, Math.min(1, (t - delay) / duration)) : 1;
    progress = progress < 0.5 ? 2*progress*progress : 1-Math.pow(-2*progress+2,2)/2;
    
    let rx = prevPositions[i] ? prevPositions[i].x : seg.x;
    let ry = prevPositions[i] ? prevPositions[i].y : seg.y;
    let x = rx + (seg.x - rx) * progress;
    let y = ry + (seg.y - ry) * progress;
    
    const padding = 1;
    const size = CELL - padding * 2;
    const hue = 340 + i * 2;
    
    const gradient = ctx.createLinearGradient(x*CELL, y*CELL, x*CELL+CELL, y*CELL+CELL);
    if (i === 0) {
      if (activeBuffs.shield) {
        gradient.addColorStop(0, '#00e5ff');
        gradient.addColorStop(1, '#00c8ff');
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#00c8ff';
      } else {
        gradient.addColorStop(0, '#ff2e63');
        gradient.addColorStop(1, '#ff0055');
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#ff0055';
      }
    } else {
      gradient.addColorStop(0, `hsl(${hue}, 80%, 55%)`);
      gradient.addColorStop(1, `hsl(${hue}, 80%, 45%)`);
      ctx.shadowBlur = 0;
    }
    ctx.fillStyle = gradient;
    drawRoundedRect(x*CELL+padding, y*CELL+padding, size, size, 4);
  }
  ctx.shadowBlur = 0;
  
  if (snake.length > 0) {
    const head = snake[0];
    const hx = head.x;
    const hy = head.y;
    const ht = running ? Math.min((now - lastTick) / (tickRate / 100), 1) : 1;
    const hdelay = 0;
    const hduration = 1 - hdelay;
    let hprogress = hduration > 0 ? Math.max(0, Math.min(1, (ht - hdelay) / hduration)) : 1;
    hprogress = hprogress < 0.5 ? 2*hprogress*hprogress : 1-Math.pow(-2*hprogress+2,2)/2;
    let hrx = prevPositions[0] ? prevPositions[0].x : hx;
    let hry = prevPositions[0] ? prevPositions[0].y : hy;
    let hxFinal = hrx + (hx - hrx) * hprogress;
    let hyFinal = hry + (hy - hry) * hprogress;
    
    ctx.fillStyle = '#fff';
    const eyeSize = 2;
    let ex1, ey1, ex2, ey2;
    if (direction.x === 1) { ex1=hxFinal*CELL+11; ey1=hyFinal*CELL+4; ex2=hxFinal*CELL+11; ey2=hyFinal*CELL+11; }
    else if (direction.x === -1) { ex1=hxFinal*CELL+4; ey1=hyFinal*CELL+4; ex2=hxFinal*CELL+4; ey2=hyFinal*CELL+11; }
    else if (direction.y === -1) { ex1=hxFinal*CELL+4; ey1=hyFinal*CELL+4; ex2=hxFinal*CELL+11; ey2=hyFinal*CELL+4; }
    else { ex1=hxFinal*CELL+4; ey1=hyFinal*CELL+11; ex2=hxFinal*CELL+11; ey2=hyFinal*CELL+11; }
    ctx.beginPath(); ctx.arc(ex1, ey1, eyeSize, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex2, ey2, eyeSize, 0, Math.PI*2); ctx.fill();
  }
  
  if (activeBuffs.shield && snake.length > 0) {
    const head = snake[0];
    const hx = head.x * CELL + CELL/2;
    const hy = head.y * CELL + CELL/2;
    const pulse = 1 + Math.sin(performance.now() * 0.01) * 0.1;
    const radius = CELL * 0.9 * pulse;
    
    ctx.strokeStyle = '#00c8ff';
    ctx.lineWidth = 2.5;
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#00c8ff';
    ctx.beginPath();
    ctx.arc(hx, hy, radius, 0, Math.PI * 2);
    ctx.stroke();
    
    ctx.fillStyle = 'rgba(0, 200, 255, 0.08)';
    ctx.beginPath();
    ctx.arc(hx, hy, radius, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.shadowBlur = 0;
  }
  
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.03;
    if (p.life <= 0) {
      particles.splice(i, 1);
      continue;
    }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  for (let i = toasts.length - 1; i >= 0; i--) {
    const t = toasts[i];
    t.y += t.vy;
    t.life -= 0.015;
    if (t.life <= 0) {
      toasts.splice(i, 1);
      continue;
    }
    ctx.globalAlpha = t.life;
    ctx.fillStyle = t.color;
    ctx.font = `bold ${CELL * 0.5}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowBlur = 10;
    ctx.shadowColor = t.color;
    ctx.fillText(t.text, t.x, t.y);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

function loop() {
  const now = performance.now();
  if (running) {
    update();
  }
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.code === 'Space') {
    if (!running && !gameOver) { startGame(); return; }
    if (gameOver) { startGame(); return; }
    return;
  }
  if (!running) return;
  switch(e.key.toLowerCase()) {
    case 'w': if (direction.y !== 1) nextDirection = {x: 0, y: -1}; break;
    case 's': if (direction.y !== -1) nextDirection = {x: 0, y: 1}; break;
    case 'a': if (direction.x !== 1) nextDirection = {x: -1, y: 0}; break;
    case 'd': if (direction.x !== -1) nextDirection = {x: 1, y: 0}; break;
  }
});

window.addEventListener('resize', resize);
resize();
loop();
</script>
</body>
</html>
